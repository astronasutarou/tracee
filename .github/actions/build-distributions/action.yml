name: Build distributions
description: Build the source distribution and Linux wheels for upload.

runs:
  using: composite
  steps:
    - name: Install build tools
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Build source distribution / wheel
      shell: bash
      run: python -m build --sdist --wheel --outdir build/dist
